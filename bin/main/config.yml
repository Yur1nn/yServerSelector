# yServerSelector (Velocity)
# This plugin now expects yServerSelector-Paper on each child server.
# Velocity sends menu snapshots over plugin messaging, and Paper opens a real chest GUI.

config-version: 1
debug: false

command:
  enabled: true
  aliases: ["server", "servers"]
  require-permission: false
  permission: "yserverselector.admin"

queue:
  # Built-in queue system. If enabled, yServerSelector handles queueing itself.
  enabled: true
  check-interval-seconds: 2
  entry-timeout-seconds: 180
  max-size-per-server: 200
  notify-position: true
  position-update-seconds: 10
  drain-per-cycle: 1
  # Optional safe destination if queued connection cannot be completed.
  fallback-server: ""

groups:
  hubs:
    balancing-mode: ROUND_ROBIN
    members: ["hub1", "hub2", "hub3"]
  pvp:
    balancing-mode: LEAST_PLAYERS
    members: ["duels", "bedwars"]

menu:
  # Must match channel in the Paper companion plugin.
  plugin-message-channel: "onelimit:yss"
  # Proxy ping interval for backend reachability and fallback player counts.
  ping-interval-seconds: 5

  rows: 3
  title: "<gold><bold>Server Selector</bold></gold>"

  items:
    - key: lobby
      slot: 10
      target: hubs
      enabled: true
      show-when-offline: true
      icon: NETHER_STAR
      use-queue: false
      display: "<aqua><bold>Lobby</bold></aqua>"
      lore:
        - "<gray>Group:</gray> <white>%server%</white>"
        - "<gray>Players:</gray> <white>%player_count%</white>"
        - "<gray>Status:</gray> <green>%status%</green>"

    - key: survival
      slot: 12
      target: pvp
      enabled: true
      show-when-offline: true
      icon: GRASS_BLOCK
      use-queue: true
      display: "<green><bold>Survival</bold></green>"
      lore:
        - "<gray>Players:</gray> <white>%player_count%</white>"
        - "<gray>Status:</gray> <green>%status%</green>"
        - "<gray>Queue Size:</gray> <yellow>%queue_size%</yellow>"
