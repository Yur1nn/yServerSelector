# yServerSelector (Velocity)
# This plugin now expects yServerSelector-Paper on each child server.
# Velocity sends menu snapshots over plugin messaging, and Paper opens a real chest GUI.

config-version: 1
debug: false

command:
  enabled: true
  aliases: ["server", "servers"]
  require-permission: false
  permission: "yserverselector.admin"

menu:
  # Must match channel in the Paper companion plugin.
  plugin-message-channel: "onelimit:yss"
  # Proxy ping interval for backend reachability and fallback player counts.
  ping-interval-seconds: 5

  rows: 3
  title: "<gold><bold>Server Selector</bold></gold>"

  # Used when item `use-queue: true` and AJQueue is installed.
  queue-command-template: "/ajqueue join %server%"

  items:
    - key: lobby
      slot: 10
      server: server1
      enabled: true
      show-when-offline: true
      icon: NETHER_STAR
      use-queue: false
      display: "<aqua><bold>Lobby</bold></aqua>"
      lore:
        - "<gray>Players:</gray> <white>%player_count%</white>"
        - "<gray>Status:</gray> <green>%status%</green>"

    - key: survival
      slot: 12
      server: server2
      enabled: true
      show-when-offline: true
      icon: GRASS_BLOCK
      use-queue: true
      display: "<green><bold>Survival</bold></green>"
      lore:
        - "<gray>Players:</gray> <white>%player_count%</white>"
        - "<gray>Status:</gray> <green>%status%</green>"
        - "<gray>Queue Enabled:</gray> <yellow>%has_ajqueue%</yellow>"
